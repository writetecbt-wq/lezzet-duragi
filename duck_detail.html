                        "stack-gap-lg": "32px",
                        "section-padding": "48px",
                        "stack-gap-sm": "8px",
                        "stack-gap-md": "16px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"],
                        "label-caps": ["Inter"],

<style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        .fill-icon { font-variation-settings: 'FILL' 1; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface">
<!-- Top Navigation -->
<nav class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl shadow-sm flex items-center justify-between px-container-margin h-16">
<button class="active:scale-95 duration-200 hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-primary">arrow_back_ios_new</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold tracking-widest text-primary uppercase">EPICUREAN</h1>
<button class="active:scale-95 duration-200 hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-primary">shopping_bag</span>
</button>
</nav>
<main class="pb-32">
<!-- Hero Image Section -->
<div class="relative w-full h-[397px] overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Exquisite close-up of a perfectly sliced duck breast with a glossy honey and orange glaze. The duck is arranged artistically over a smooth, creamy bed of orange-colored sweet potato puree, accented with vibrant red cherry sauce droplets and fresh micro-greens. The lighting is soft and cinematic, highlighting the rich textures and premium quality of the ingredients in a clean, minimalist setting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCEA7rDdRqPpwnqDXFY3n2PthweUjb8ItGz9Rh68jI63zbaptrc3P9kd12_n3m27PNnF-3J6toBu-gb1s6nuJeQqajN4Huirq9o9aC904CKMXx6X_lxrZsTqTscb4huWKeaG178CqjLIHeclTw8vXckM2vaunOKyqHe7gXB_7_43C0eNUu3MYCBHqYT_oZDaKrWfiQJtuy_0Bwpk0dc1fC7O9AUhBKYOuUUch_aRyiFAE_tvmUdfelctSD8FCTEDYf4LewXFf7nnwI"/>
<div class="absolute inset-0 bg-gradient-to-t from-background/40 to-transparent"></div>
</div>
<!-- Content Canvas -->
<div class="px-container-margin -mt-8 relative z-10">
<div class="bg-white rounded-lg p-6 shadow-sm border border-outline-variant/20">
<div class="flex justify-between items-start mb-4">
<h2 class="font-display text-display text-on-surface leading-tight">Ballı Ördek Göğsü</h2>
<span class="font-price-lg text-price-lg text-accent-gold mt-2">910 TL</span>
</div>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-8 leading-relaxed">
                    Portakal ve bal marinasyonu ile fırınlanmış ördek göğsü, vişne sosu ve tatlı patates püresi ile.
                </p>
<!-- Nutritional Stats Bento Grid -->
<div class="grid grid-cols-2 gap-3 mb-8">
<div class="bg-surface-container-low p-4 rounded-xl flex flex-col justify-between">
<span class="font-label-caps text-label-caps text-on-tertiary-container uppercase">Enerji</span>
<span class="font-headline-md text-headline-md mt-1">810 kcal</span>
</div>
<div class="bg-surface-container-low p-4 rounded-xl flex flex-col justify-between">
<span class="font-label-caps text-label-caps text-on-tertiary-container uppercase">Protein</span>
<span class="font-headline-md text-headline-md mt-1">38g</span>
</div>
<div class="bg-surface-container-low p-4 rounded-xl flex flex-col justify-between">
<span class="font-label-caps text-label-caps text-on-tertiary-container uppercase">Yağ</span>
<span class="font-headline-md text-headline-md mt-1">42g</span>
</div>
<div class="bg-surface-container-low p-4 rounded-xl flex flex-col justify-between">
<span class="font-label-caps text-label-caps text-on-tertiary-container uppercase">Karbonhidrat</span>
<span class="font-headline-md text-headline-md mt-1">22g</span>
</div>
</div>
<!-- Customization Sections -->
<div class="space-y-8">
<!-- Doneness -->
<section>
<div class="flex items-center justify-between mb-4">
<h3 class="font-headline-md text-headline-md text-on-surface">Pişme Derecesi</h3>
<span class="font-label-caps text-label-caps bg-secondary-container/30 text-secondary px-3 py-1 rounded-full uppercase">Zorunlu</span>
</div>
<div class="space-y-3">
<label class="flex items-center justify-between p-4 bg-surface-container-lowest border border-outline-variant/30 rounded-xl cursor-pointer active:bg-surface-container transition-colors">
<span class="font-body-md text-body-md">Az Pişmiş</span>
<input checked="" class="w-5 h-5 text-accent-gold border-outline focus:ring-accent-gold" name="doneness" type="radio"/>
</label>
<label class="flex items-center justify-between p-4 bg-surface-container-lowest border border-outline-variant/30 rounded-xl cursor-pointer active:bg-surface-container transition-colors">
<span class="font-body-md text-body-md">Orta Pişmiş</span>
<input class="w-5 h-5 text-accent-gold border-outline focus:ring-accent-gold" name="doneness" type="radio"/>
</label>
<label class="flex items-center justify-between p-4 bg-surface-container-lowest border border-outline-variant/30 rounded-xl cursor-pointer active:bg-surface-container transition-colors">
<span class="font-body-md text-body-md">Çok Pişmiş</span>
<input class="w-5 h-5 text-accent-gold border-outline focus:ring-accent-gold" name="doneness" type="radio"/>
</label>
</div>
</section>
<!-- Allergy Info -->
<section>
<button class="w-full flex items-center justify-between p-5 bg-surface-container border border-outline-variant/30 rounded-xl active:scale-[0.98] transition-transform">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-accent-gold">info</span>
<span class="font-headline-md text-headline-md">Alerji Bilgisi</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</button>
</section>
</div>
</div>
</div>
</main>
<!-- Fixed Bottom CTA -->
<footer class="fixed bottom-0 left-0 w-full bg-surface/90 backdrop-blur-xl px-container-margin pt-4 pb-8 border-t border-outline-variant/20 z-50">
<div class="flex items-center gap-4">
<!-- Quantity Selector -->
<div class="flex items-center bg-surface-container-high rounded-full px-4 py-2 h-[56px]">
<button class="w-8 h-8 flex items-center justify-center text-on-surface active:opacity-50" onclick="decrement()">
<span class="material-symbols-outlined text-[20px]">remove</span>
</button>
<span class="w-10 text-center font-headline-md text-headline-md" id="qty">1</span>
<button class="w-8 h-8 flex items-center justify-center text-on-surface active:opacity-50" onclick="increment()">
<span class="material-symbols-outlined text-[20px]">add</span>
</button>
</div>
<!-- Add to Cart Button -->
<button class="flex-1 bg-accent-gold text-white font-headline-md text-headline-md py-4 rounded-full shadow-lg shadow-accent-gold/20 active:scale-95 transition-all duration-200">
                Sepete Ekle
            </button>
</div>
</footer>
<script>
        let quantity = 1;
        function increment() {
            quantity++;
            document.getElementById('qty').innerText = quantity;
        }
        function decrement() {
            if (quantity > 1) {
                quantity--;
                document.getElementById('qty').innerText = quantity;
            }
        }

        // Simple scroll effect for header
        window.onscroll = function() {
            const nav = document.querySelector('nav');
            if (window.pageYOffset > 50) {
                nav.classList.add('shadow-md');
            } else {
                nav.classList.remove('shadow-md');
            }
        };
    </script>
</body></html>
